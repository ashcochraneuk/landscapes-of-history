<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Landscapes of History</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="style.css?v=mobile-live-1">
    <link rel="stylesheet" href="mobile.css?v=mobile-live-1">
</head>
<body>
    <aside id="sidebar">
        <img src="images/logo_transparent_cropped.png" id="logo" alt="Landscapes of History">
        <p id="tagline">Explore Britain's historic landscapes, structures and forgotten places.</p>
        <section><h2>Search</h2><div id="searchBar"><input id="searchInput" placeholder="Search place, county or site..." autocomplete="off"><button id="searchButton">Search</button></div><div id="searchSummary"></div><div id="searchTabs"></div><div id="searchResults"></div></section>
        <section><h2>Map Style</h2><div id="mapStyles"><label><input type="radio" name="mapStyle" value="loh" checked> Landscapes of History</label><label><input type="radio" name="mapStyle" value="osm"> OpenStreetMap</label><label><input type="radio" name="mapStyle" value="satellite"> Satellite</label></div></section>
        <section><h2>Projects</h2><div id="projects"><button class="projectCard projectControl" data-project="martello"><img src="icons/martellotowers.png" alt=""><span>Martello Towers</span></button><button class="projectCard projectControl" data-project="water"><img src="icons/watertower.png" alt=""><span>Water Towers</span></button><button class="projectCard projectControl" data-project="battlefield"><img src="icons/Battlefields.png" alt=""><span>Battlefields</span></button><button class="projectCard projectControl" data-project="lighthouse"><img src="icons/Lighthouses.png" alt=""><span>Lighthouses</span></button><button class="projectCard projectControl" data-project="geoglyph"><img src="icons/Geoglyphs.png" alt=""><span>Geoglyphs</span></button></div></section>
    </aside>
    <main id="map"></main>
    <div id="mobileUI">
        <header id="mobileHeader"><img src="images/logo_transparent_cropped.png" alt="Landscapes of History"><button class="mobileIconButton" id="mobileSearchOpen" aria-label="Open search">⌕</button></header>
        <nav id="mobileNav" aria-label="Map navigation"><button class="mobileNavButton" data-panel="explore"><span class="mobileNavIcon">⌖</span><span>Explore</span></button><button class="mobileNavButton" data-panel="search"><span class="mobileNavIcon">⌕</span><span>Search</span></button><button class="mobileNavButton" data-panel="layers"><span class="mobileNavIcon">◫</span><span>Map</span></button></nav>
        <div id="mobileBackdrop"></div>
        <section class="mobileSheet" id="mobileExploreSheet" data-sheet="explore" aria-hidden="true"><div class="sheetHandle"></div><div class="sheetHeader"><div><span class="sheetEyebrow">Landscapes of History</span><h2>Explore</h2></div><button class="sheetClose" aria-label="Close panel">×</button></div><p class="sheetIntro">Choose a collection to reveal its locations across Britain.</p><div class="mobileProjects"><button class="mobileProjectCard projectControl" data-project="martello"><img src="icons/martellotowers.png" alt=""><span><strong>Martello Towers</strong><small>Coastal fortifications</small></span><i>+</i></button><button class="mobileProjectCard projectControl" data-project="water"><img src="icons/watertower.png" alt=""><span><strong>Water Towers</strong><small>Historic structures</small></span><i>+</i></button><button class="mobileProjectCard projectControl" data-project="battlefield"><img src="icons/Battlefields.png" alt=""><span><strong>Battlefields</strong><small>Conflict and landscape</small></span><i>+</i></button><button class="mobileProjectCard projectControl" data-project="lighthouse"><img src="icons/Lighthouses.png" alt=""><span><strong>Lighthouses</strong><small>Coastal navigation</small></span><i>+</i></button><button class="mobileProjectCard projectControl" data-project="geoglyph"><img src="icons/Geoglyphs.png" alt=""><span><strong>Geoglyphs</strong><small>Figures cut into the landscape</small></span><i>+</i></button></div></section>
        <section class="mobileSheet" id="mobileSearchSheet" data-sheet="search" aria-hidden="true"><div class="sheetHandle"></div><div class="sheetHeader"><div><span class="sheetEyebrow">Find a landscape</span><h2>Search</h2></div><button class="sheetClose" aria-label="Close panel">×</button></div><div id="mobileSearchBar"><input id="mobileSearchInput" placeholder="Place, county or site..." autocomplete="off"><button id="mobileSearchButton">Search</button></div><div id="mobileSearchSummary"></div><div id="mobileSearchTabs"></div><div id="mobileSearchResults"></div></section>
        <section class="mobileSheet" id="mobileLayersSheet" data-sheet="layers" aria-hidden="true"><div class="sheetHandle"></div><div class="sheetHeader"><div><span class="sheetEyebrow">Change the view</span><h2>Map Style</h2></div><button class="sheetClose" aria-label="Close panel">×</button></div><div class="mobileMapStyles"><label><input type="radio" name="mobileMapStyle" value="loh" checked><span><strong>Landscapes of History</strong><small>Our custom map</small></span></label><label><input type="radio" name="mobileMapStyle" value="osm"><span><strong>OpenStreetMap</strong><small>Modern street detail</small></span></label><label><input type="radio" name="mobileMapStyle" value="satellite"><span><strong>Satellite</strong><small>Aerial landscape view</small></span></label></div></section>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js?v=mobile-live-1"></script>
    <script src="projects-extra.js?v=projects-live-1"></script>
    <script src="mobile.js?v=mobile-live-1"></script>
</body>
</html>
